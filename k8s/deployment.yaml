apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-app
  namespace: test-argo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: argo-app
  template:
    metadata:
      labels:
        app: argo-app
    spec:
      containers:
        - name: argo-app
          image: default-route-openshift-image-registry.apps.tafcopl.cdot.in/test-argo/argo-app:latest
          ports:
            - containerPort: 8080
